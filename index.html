<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>小玥的好吃好吃口袋名單</title>

<style>
:root{
  --cream:#f6f1e7;
  --bar:#d7c0a5;
  --deep:#4e3b2f;
  --light:#fffaf4;
}

body{
  margin:0;
  font-family:"PingFang TC";
  background:var(--cream);
  color:var(--deep);
}

header{
  text-align:center;
  padding:18px;
}

.top{
  display:flex;
  justify-content:center;
  gap:10px;
}

button{
  border:none;
  background:var(--bar);
  color:white;
  padding:10px 14px;
  border-radius:999px;
}

#form{
  display:none;
  margin:10px;
  padding:14px;
  background:var(--light);
  border-radius:20px;
}

input,textarea{
  width:100%;
  margin:6px 0;
  padding:10px;
  border:none;
  border-radius:12px;
  background:#f3e5d3;
}

.card{
  background:var(--bar);
  border-radius:20px;
  margin:10px;
  padding:12px;
  display:flex;
  justify-content:space-between;
  position:relative;
}

.img{
  width:65px;
  height:65px;
  border-radius:14px;
  object-fit:cover;
}

.menu{
  position:absolute;
  right:10px;
  top:6px;
  cursor:pointer;
}

.dropdown{
  position:absolute;
  right:10px;
  top:28px;
  background:white;
  display:none;
  border-radius:10px;
}

.dropdown div{
  padding:8px 12px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
<h2>小玥的好吃好吃口袋名單</h2>
</header>

<div class="top">
<button onclick="toggleForm()">＋ 新增</button>
<button onclick="randomPick()">🎲 吃什麼</button>
</div>

<div id="form">
<input id="name" placeholder="餐廳名稱">
<input id="addr" placeholder="地址">
<textarea id="memo" placeholder="心得"></textarea>

<input id="r1" placeholder="小玥評分">
<input id="r2" placeholder="廖鑫鑫評分">

<input type="file" id="img">

<button onclick="add()">儲存</button>
</div>

<div id="list"></div>

<script type="module">

/* ✦ Firebase module版 */
import { initializeApp } 
from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
deleteDoc,
doc,
onSnapshot,
updateDoc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDCFwcRu5Stm8wD6X-XTHnLsQPl2AHzshs",
authDomain: "foof-de011.firebaseapp.com",
projectId: "foof-de011",
storageBucket: "foof-de011.firebasestorage.app",
messagingSenderId: "1099059447758",
appId: "1:1099059447758:web:38e8fc613758967bce4d9f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let data = [];
let editId = null;

/* ✦ 即時同步 */
onSnapshot(collection(db,"foods"),(snap)=>{

data = snap.docs.map(d=>({
id:d.id,
...d.data()
}));

render();

});

/* ✦ toggle */
window.toggleForm = ()=>{
document.getElementById("form").style.display =
document.getElementById("form").style.display==="block"
?"none":"block";
}

/* ✦ 新增 */
window.add = async ()=>{

const item = {
name:document.getElementById("name").value,
addr:document.getElementById("addr").value,
memo:document.getElementById("memo").value,
r1:document.getElementById("r1").value,
r2:document.getElementById("r2").value,
img:""
};

const file = document.getElementById("img").files[0];

const save = async (img)=>{

item.img = img;

if(editId){

await updateDoc(doc(db,"foods",editId),item);
editId = null;

}else{

await addDoc(collection(db,"foods"),item);

}

document.getElementById("form").reset();
toggleForm();

};

if(file){

const reader = new FileReader();

reader.onload = e=>{

const img = new Image();

img.onload = ()=>{

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

const w=500;
canvas.width=w;
canvas.height=img.height*(w/img.width);

ctx.drawImage(img,0,0,canvas.width,canvas.height);

save(canvas.toDataURL("image/jpeg",0.7));

};

img.src=e.target.result;

};

reader.readAsDataURL(file);

}else{
save("");
}

}

/* ✦ 刪除 */
window.del = async (id)=>{
await deleteDoc(doc(db,"foods",id));
}

/* ✦ 編輯 */
window.edit = (i)=>{

const it = data[i];

editId = it.id;

document.getElementById("name").value=it.name;
document.getElementById("addr").value=it.addr;
document.getElementById("memo").value=it.memo;
document.getElementById("r1").value=it.r1;
document.getElementById("r2").value=it.r2;

toggleForm();

}

/* ✦ render */
function render(){

document.getElementById("list").innerHTML="";

data.forEach((i,index)=>{

const div=document.createElement("div");

div.className="card";

div.innerHTML=`
<div>
<h3>${i.name}</h3>
<p>${i.addr}</p>
<p>⭐ ${i.r1||"—"} / ${i.r2||"—"}</p>
<p>${i.memo}</p>
</div>

<img class="img" src="${i.img||""}">

<div class="menu" onclick="toggleMenu(${index})">⋯</div>

<div class="dropdown" id="m${index}">
<div onclick="edit(${index})">編輯</div>
<div onclick="del('${i.id}')">刪除</div>
</div>
`;

document.getElementById("list").appendChild(div);

});

}

window.toggleMenu=(i)=>{
const el=document.getElementById("m"+i);
el.style.display=el.style.display==="block"?"none":"block";
}

window.randomPick=()=>{
if(data.length===0)return alert("沒有資料");
const r=data[Math.floor(Math.random()*data.length)];
alert("今天吃："+r.name);
}

</script>

</body>
</html>
