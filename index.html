<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>小玥的好吃好吃口袋名單</title>

<style>

:root{
    --cream:#f6f1e7;
    --bar:#d7c0a5;
    --deep:#4e3b2f;
    --light:#fffaf4;
}

body{
    margin:0;
    background:var(--cream);
    font-family:"PingFang TC", sans-serif;
    color:var(--deep);
}

header{
    text-align:center;
    padding:22px 10px 10px;
}

header h1{
    margin:0;
    font-size:20px;
}

.top{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:12px;
}

button{
    border:none;
    background:var(--bar);
    color:white;
    padding:10px 16px;
    border-radius:999px;
    cursor:pointer;
}

#form{
    display:none;
    background:var(--light);
    margin:12px;
    padding:14px;
    border-radius:24px;
}

input,textarea{
    width:100%;
    padding:10px;
    margin:6px 0;
    border:none;
    border-radius:14px;
    background:#f3e5d3;
}

.card{
    background:var(--bar);
    border-radius:24px;
    margin-bottom:12px;
    padding:12px;
    display:flex;
    justify-content:space-between;
    position:relative;
}

.img{
    width:72px;
    height:72px;
    object-fit:cover;
    border-radius:18px;
}

.menu{
    position:absolute;
    top:8px;
    right:10px;
    cursor:pointer;
}

.dropdown{
    display:none;
    position:absolute;
    top:34px;
    right:10px;
    background:white;
    border-radius:14px;
}

.dropdown div{
    padding:10px;
    cursor:pointer;
}

</style>
</head>

<body>

<header>
<h1>*・°☆.。小玥的好吃好吃口袋名單 *・°☆.。</h1>
</header>

<div class="top">
<button onclick="toggleForm()">＋ 新增</button>
</div>

<!-- FORM -->
<div id="form">

<input id="name" placeholder="餐廳名稱">
<input id="addr" placeholder="地址">
<textarea id="memo" placeholder="心得"></textarea>

<div>
<label><input type="radio" name="type" value="早餐">早餐</label>
<label><input type="radio" name="type" value="午餐">午餐</label>
<label><input type="radio" name="type" value="點心">點心</label>
<label><input type="radio" name="type" value="晚餐">晚餐</label>
<label><input type="radio" name="type" value="宵夜">宵夜</label>
</div>

<input id="r1" placeholder="小玥評分">
<input id="r2" placeholder="廖鑫鑫評分">
<input type="file" id="img">

<button onclick="add()">儲存</button>

</div>

<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
deleteDoc,
doc,
onSnapshot,
updateDoc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* ===== Firebase ===== */

const firebaseConfig = {
apiKey: "AIzaSyDCFwcRu5Stm8wD6X-XTHnLsQPl2AHzshs",
authDomain: "foof-de011.firebaseapp.com",
projectId: "foof-de011",
storageBucket: "foof-de011.firebasestorage.app",
messagingSenderId: "1099059447758",
appId: "1:1099059447758:web:38e8fc613758967bce4d9f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ===== DATA ===== */

let data = [];
let editId = null;

/* ===== 即時同步 ===== */

onSnapshot(collection(db,"foods"),(snap)=>{
data = snap.docs.map(d=>({
id:d.id,
...d.data()
}));
render();
});

/* ===== UI ===== */

window.toggleForm = ()=>{
form.style.display =
form.style.display==="block"
? "none"
: "block";
};

/* ===== type ===== */

function getType(){
return document.querySelector('input[name="type"]:checked')?.value || "未分類";
}

/* ===== add / edit ===== */

window.add = async ()=>{

const item = {
name: document.getElementById("name").value,
addr: document.getElementById("addr").value,
memo: document.getElementById("memo").value,
r1: document.getElementById("r1").value,
r2: document.getElementById("r2").value,
type: getType(),
img:""
};

const file = document.getElementById("img").files[0];

const save = async (img)=>{

item.img = img || "";

if(editId){
await updateDoc(doc(db,"foods",editId),item);
editId = null;
}else{
await addDoc(collection(db,"foods"),item);
}

form.reset();
toggleForm();

};

if(file){

const reader = new FileReader();

reader.onload = e=>{

const image = new Image();

image.onload = ()=>{

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

const w = 500;
canvas.width = w;
canvas.height = image.height*(w/image.width);

ctx.drawImage(image,0,0,canvas.width,canvas.height);

save(canvas.toDataURL("image/jpeg",0.7));

};

image.src = e.target.result;

};

reader.readAsDataURL(file);

}else{
save("");
}

};

/* ===== delete ===== */

window.del = async (id)=>{
await deleteDoc(doc(db,"foods",id));
};

/* ===== edit ===== */

window.edit = (i)=>{

const it = data[i];
editId = it.id;

name.value = it.name;
addr.value = it.addr;
memo.value = it.memo;
r1.value = it.r1;
r2.value = it.r2;

document.querySelectorAll('input[name="type"]').forEach(r=>{
r.checked = r.value === it.type;
});

toggleForm();
};

/* ===== render ===== */

function render(){

list.innerHTML="";

const order=["早餐","午餐","點心","晚餐","宵夜","未分類"];

data.sort((a,b)=>order.indexOf(a.type)-order.indexOf(b.type));

data.forEach((i,index)=>{

const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div>
<h3>${i.name}</h3>
<p>${i.addr}</p>
<p>小玥 ⭐ ${i.r1||"—"}</p>
<p>廖鑫鑫 ⭐ ${i.r2||"—"}</p>
<p>${i.memo}</p>
</div>

<img class="img" src="${i.img||""}">

<div class="menu" onclick="toggleMenu(${index})">⋯</div>

<div class="dropdown" id="m${index}">
<div onclick="edit(${index})">編輯</div>
<div onclick="del('${i.id}')">刪除</div>
</div>
`;

list.appendChild(div);

});

}

/* menu */

window.toggleMenu = (i)=>{
const el = document.getElementById("m"+i);
el.style.display = el.style.display==="block"?"none":"block";
};

</script>

</body>
</html>
