<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>小玥的好吃好吃口袋名單</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
deleteDoc,
doc,
onSnapshot,
updateDoc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

/* ✦ Firebase */
const firebaseConfig = {
apiKey: "AIzaSyDCFwcRu5Stm8wD6X-XTHnLsQPl2AHzshs",
authDomain: "foof-de011.firebaseapp.com",
projectId: "foof-de011",
storageBucket: "foof-de011.firebasestorage.app",
messagingSenderId: "1099059447758",
appId: "1:1099059447758:web:38e8fc613758967bce4d9f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let data = [];
let editId = null;
let pickTypeNow = null;

/* ✦ 即時同步 */
onSnapshot(collection(db,"foods"),(snap)=>{
data = snap.docs.map(d=>({id:d.id,...d.data()}));
render();
});

/* ✦ form */
window.toggleForm=()=>{
document.getElementById("form").style.display=
document.getElementById("form").style.display==="block"?"none":"block";
}

/* ✦ type */
function getType(){
const t=document.querySelector('input[name="type"]:checked');
return t?t.value:"未分類";
}

/* ✦ add */
window.add=async()=>{

const item={
name:document.getElementById("name").value,
addr:document.getElementById("addr").value,
memo:document.getElementById("memo").value,
r1:document.getElementById("r1").value,
r2:document.getElementById("r2").value,
type:getType(),
img:""
};

const file=document.getElementById("img").files[0];

const save=async(img)=>{
item.img=img||"";

if(editId){
await updateDoc(doc(db,"foods",editId),item);
editId=null;
}else{
await addDoc(collection(db,"foods"),item);
}

document.getElementById("form").reset();
toggleForm();
};

if(file){

const reader=new FileReader();

reader.onload=e=>{
const img=new Image();

img.onload=()=>{

const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");

const w=500;
canvas.width=w;
canvas.height=img.height*(w/img.width);

ctx.drawImage(img,0,0,canvas.width,canvas.height);

save(canvas.toDataURL("image/jpeg",0.7));

};

img.src=e.target.result;
};

reader.readAsDataURL(file);

}else{
save("");
}

}

/* ✦ delete */
window.del=async(id)=>{
await deleteDoc(doc(db,"foods",id));
}

/* ✦ edit */
window.edit=(i)=>{
const it=data[i];
editId=it.id;

document.getElementById("name").value=it.name;
document.getElementById("addr").value=it.addr;
document.getElementById("memo").value=it.memo;
document.getElementById("r1").value=it.r1;
document.getElementById("r2").value=it.r2;

document.querySelectorAll('input[name="type"]').forEach(r=>{
r.checked=r.value===it.type;
});

toggleForm();
}

/* ✦ render */
function render(){

const list=document.getElementById("list");
list.innerHTML="";

const order=["早餐","午餐","點心","晚餐","宵夜","未分類"];

data.sort((a,b)=>order.indexOf(a.type)-order.indexOf(b.type));

data.forEach((i,index)=>{

const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div>
<div class="type">${i.type}</div>
<h3>${i.name}</h3>
<p>${i.addr}</p>
<p>⭐ ${i.r1||"—"} / ${i.r2||"—"}</p>
<p>${i.memo}</p>
</div>

<img class="img" src="${i.img||""}">

<div class="menu" onclick="toggleMenu(${index})">⋯</div>

<div class="dropdown" id="m${index}">
<div onclick="edit(${index})">編輯</div>
<div onclick="del('${i.id}')">刪除</div>
</div>
`;

list.appendChild(div);

});
}

window.toggleMenu=(i)=>{
const el=document.getElementById("m"+i);
el.style.display=el.style.display==="block"?"none":"block";
}

/* ✦ 🍽 吃什麼（新增分類選擇） */
window.randomPick=()=>{

document.getElementById("pickBox").style.display="flex";

}

window.chooseType=(type)=>{

document.getElementById("pickBox").style.display="none";

let pool = data;

if(type!=="全部"){
pool = data.filter(i=>i.type===type);
}

if(pool.length===0){
alert("這個分類沒有餐廳");
return;
}

const r = pool[Math.floor(Math.random()*pool.length)];

alert("今天吃："+r.name+"\n📍"+r.addr);

}

</script>

<style>

body{
margin:0;
font-family:"PingFang TC";
background:#f6f1e7;
color:#4e3b2f;
}

header{
text-align:center;
padding:18px;
}

.top{
display:flex;
justify-content:center;
gap:10px;
}

button{
background:#d7c0a5;
border:none;
padding:10px 14px;
border-radius:999px;
color:white;
}

#form{
display:none;
margin:10px;
padding:14px;
background:#fffaf4;
border-radius:18px;
}

input,textarea{
width:100%;
margin:6px 0;
padding:10px;
border-radius:12px;
border:none;
background:#f3e5d3;
}

.card{
background:#d7c0a5;
margin:10px;
padding:12px;
border-radius:18px;
display:flex;
justify-content:space-between;
position:relative;
}

.img{
width:65px;
height:65px;
border-radius:14px;
object-fit:cover;
}

.menu{
position:absolute;
top:6px;
right:10px;
cursor:pointer;
}

.dropdown{
position:absolute;
top:28px;
right:10px;
background:white;
border-radius:10px;
display:none;
}

.dropdown div{
padding:8px 12px;
cursor:pointer;
}

.type{
font-size:12px;
opacity:0.7;
}

/* ✦ 吃什麼選擇框 */
#pickBox{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.3);
justify-content:center;
align-items:center;
}

.pick{
background:#fffaf4;
padding:20px;
border-radius:20px;
text-align:center;
display:flex;
flex-direction:column;
gap:10px;
}

.pick button{
width:200px;
}

</style>

</head>

<body>

<header>
<h2>小玥的好吃好吃口袋名單</h2>
</header>

<div class="top">
<button onclick="toggleForm()">＋ 新增</button>
<button onclick="randomPick()">🎲 吃什麼</button>
</div>

<div id="form">

<input id="name" placeholder="餐廳名稱">
<input id="addr" placeholder="地址">
<textarea id="memo" placeholder="心得"></textarea>

<div>
<label><input type="radio" name="type" value="早餐">早餐</label>
<label><input type="radio" name="type" value="午餐">午餐</label>
<label><input type="radio" name="type" value="點心">點心</label>
<label><input type="radio" name="type" value="晚餐">晚餐</label>
<label><input type="radio" name="type" value="宵夜">宵夜</label>
</div>

<input id="r1" placeholder="小玥評分">
<input id="r2" placeholder="廖鑫鑫評分">
<input type="file" id="img">

<button onclick="add()">儲存</button>

</div>

<div id="list"></div>

<!-- ✦ 吃什麼分類選擇 -->
<div id="pickBox">
<div class="pick">

<h3>今天想吃什麼？</h3>

<button onclick="chooseType('早餐')">早餐</button>
<button onclick="chooseType('午餐')">午餐</button>
<button onclick="chooseType('點心')">點心</button>
<button onclick="chooseType('晚餐')">晚餐</button>
<button onclick="chooseType('宵夜')">宵夜</button>
<button onclick="chooseType('全部')">全部</button>

</div>
</div>

</body>
</html>
