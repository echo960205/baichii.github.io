<!DOCTYPE html>
<html lang="zh-Hant">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>*・°☆.。小玥的好吃好吃口袋名單 *・°☆.。</title>

<style>

:root{
--cream:#f6f1e7;
--bar:#d7c0a5;
--deep:#4e3b2f;
--light:#fffaf4;
}

body{
margin:0;
background:var(--cream);
font-family:"PingFang TC",sans-serif;
color:var(--deep);
}

header{
text-align:center;
padding:22px 10px 10px;
}

header h1{
margin:0;
font-size:15px;
font-weight:600;
line-height:1.3;
white-space:nowrap;
}

.top{
display:flex;
justify-content:center;
gap:10px;
margin:12px;
}

button{
border:none;
background:var(--bar);
color:white;
padding:10px 16px;
border-radius:999px;
cursor:pointer;
font-size:14px;
}

#form{
display:none;
background:var(--light);
margin:12px;
padding:14px;
border-radius:24px;
}

input,textarea{
width:100%;
padding:10px;
margin:6px 0;
border:none;
border-radius:14px;
background:#f3e5d3;
box-sizing:border-box;
}

textarea{resize:none;}

.card{
background:var(--bar);
border-radius:24px;
margin:12px;
padding:12px;
display:flex;
justify-content:space-between;
gap:12px;
position:relative;
}

.img{
width:72px;
height:72px;
object-fit:cover;
border-radius:18px;
background:#eee;
}

.menu{
position:absolute;
top:8px;
right:10px;
cursor:pointer;
}

.dropdown{
display:none;
position:absolute;
top:34px;
right:10px;
background:white;
border-radius:14px;
overflow:hidden;
z-index:10;
}

.dropdown div{
padding:10px;
cursor:pointer;
}

/* picker */
#picker{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.3);
justify-content:center;
align-items:center;
z-index:999;
}

.box{
background:var(--light);
padding:22px;
border-radius:24px;
text-align:center;
width:80%;
max-width:320px;
position:relative;
}

#closePicker{
position:absolute;
top:10px;
right:12px;
cursor:pointer;
font-size:18px;
}

.pick-grid{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
margin-top:14px;
}

#wheelResult{
margin-top:12px;
min-height:40px;
}

</style>
</head>

<body>

<header>
<h1>*・°☆.。小玥的好吃好吃口袋名單 *・°☆.。</h1>
</header>

<div class="top">
<button onclick="toggleForm()">＋ 新增</button>
<button onclick="openPicker()">🍴 吃什麼</button>
</div>

<!-- FORM -->
<div id="form">

<input id="name" placeholder="餐廳名稱">
<input id="addr" placeholder="地址">
<textarea id="memo" placeholder="心得"></textarea>

<div>
<label><input type="radio" name="type" value="早餐"> 早餐</label>
<label><input type="radio" name="type" value="午餐"> 午餐</label>
<label><input type="radio" name="type" value="點心"> 點心</label>
<label><input type="radio" name="type" value="晚餐"> 晚餐</label>
<label><input type="radio" name="type" value="宵夜"> 宵夜</label>
</div>

<input id="r1" placeholder="小玥評分">
<input id="r2" placeholder="廖鑫鑫評分">
<input type="file" id="img">

<button onclick="add()">儲存</button>

</div>

<!-- PICKER -->
<div id="picker" onclick="outsideClose(event)">

<div class="box" onclick="event.stopPropagation()">

<div id="closePicker" onclick="closePicker()">✕</div>

<h3>今天想吃哪一餐？</h3>

<div class="pick-grid">

<button onclick="startWheel('早餐')">早餐</button>
<button onclick="startWheel('午餐')">午餐</button>
<button onclick="startWheel('點心')">點心</button>
<button onclick="startWheel('晚餐')">晚餐</button>
<button onclick="startWheel('宵夜')">宵夜</button>
<button onclick="startWheel('全部')">全部</button>

</div>

<div id="wheelResult"></div>

</div>

</div>

<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
deleteDoc,
doc,
onSnapshot,
updateDoc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDCFwcRu5Stm8wD6X-XTHnLsQPl2AHzshs",
authDomain: "foof-de011.firebaseapp.com",
projectId: "foof-de011",
storageBucket: "foof-de011.firebasestorage.app",
messagingSenderId: "1099059447758",
appId: "1:1099059447758:web:38e8fc613758967bce4d9f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const form=document.getElementById("form");
const list=document.getElementById("list");
const picker=document.getElementById("picker");

let data=[];
let editId=null;
let editImg="";

/* realtime */
onSnapshot(collection(db,"foods"),(snap)=>{
data=snap.docs.map(d=>({id:d.id,...d.data()}));
render();
});

/* form */
window.toggleForm=()=>{
form.style.display=form.style.display==="block"?"none":"block";
};

function getType(){
return document.querySelector('input[name="type"]:checked')?.value||"未分類";
}

function reset(){
document.getElementById("name").value="";
document.getElementById("addr").value="";
document.getElementById("memo").value="";
document.getElementById("r1").value="";
document.getElementById("r2").value="";
document.getElementById("img").value="";
document.querySelectorAll('input[name="type"]').forEach(r=>r.checked=false);
editId=null;
editImg="";
}

/* ADD */
window.add=async()=>{

const item={
name:document.getElementById("name").value,
addr:document.getElementById("addr").value,
memo:document.getElementById("memo").value,
r1:document.getElementById("r1").value,
r2:document.getElementById("r2").value,
type:getType(),
img:editImg
};

const file=document.getElementById("img").files[0];

const save=async(img)=>{

item.img=img||editImg||"";

if(editId){
await updateDoc(doc(db,"foods",editId),item);
}else{
await addDoc(collection(db,"foods"),item);
}

reset();
form.style.display="none";
};

if(file){

const reader=new FileReader();
reader.onload=e=>{
const image=new Image();

image.onload=()=>{
const c=document.createElement("canvas");
const ctx=c.getContext("2d");

const w=500;
c.width=w;
c.height=image.height*(w/image.width);

ctx.drawImage(image,0,0,c.width,c.height);

save(c.toDataURL("image/jpeg",0.7));
};

image.src=e.target.result;
};
reader.readAsDataURL(file);

}else{
save("");
}

};

/* DELETE */
window.del=async(id)=>{
await deleteDoc(doc(db,"foods",id));
};

/* EDIT（修好：正確資料 + 保留圖片） */
window.edit=(id)=>{

const it=data.find(d=>d.id===id);

editId=it.id;
editImg=it.img||"";

document.getElementById("name").value=it.name;
document.getElementById("addr").value=it.addr;
document.getElementById("memo").value=it.memo;
document.getElementById("r1").value=it.r1;
document.getElementById("r2").value=it.r2;

document.querySelectorAll('input[name="type"]').forEach(r=>{
r.checked=r.value===it.type;
});

form.style.display="block";
};

/* RENDER（修好 id 對應） */
function render(){

list.innerHTML="";

const order=["早餐","午餐","點心","晚餐","宵夜","未分類"];

const sorted=[...data].sort((a,b)=>
order.indexOf(a.type||"未分類")-order.indexOf(b.type||"未分類")
);

sorted.forEach((i)=>{

const div=document.createElement("div");
div.className="card";

div.innerHTML=`
<div>
<div style="font-size:12px;opacity:0.7">${i.type||"未分類"}</div>
<h3>${i.name}</h3>
<p>${i.addr}</p>
<p>⭐ ${i.r1||"—"} / ${i.r2||"—"}</p>
<p>${i.memo}</p>
</div>

<img class="img" src="${i.img||""}">

<div class="menu" onclick="toggleMenu('${i.id}')">⋯</div>

<div class="dropdown" id="m${i.id}">
<div onclick="edit('${i.id}')">編輯</div>
<div onclick="del('${i.id}')">刪除</div>
</div>
`;

list.appendChild(div);
});
}

/* MENU */
window.toggleMenu=(id)=>{
document.querySelectorAll(".dropdown").forEach(e=>e.style.display="none");
const el=document.getElementById("m"+id);
if(el) el.style.display=el.style.display==="block"?"none":"block";
};

/* PICKER */
window.openPicker=()=>{
picker.style.display="flex";
};

window.closePicker=()=>{
picker.style.display="none";
document.getElementById("wheelResult").innerHTML="";
};

window.outsideClose=(e)=>{
if(e.target===picker) closePicker();
};

/* 🎡 轉盤 */
window.startWheel=(type)=>{

let pool=type==="全部"?data:data.filter(i=>i.type===type);
const box=document.getElementById("wheelResult");

if(pool.length===0){
box.innerHTML="沒有資料";
return;
}

let count=0;

let timer=setInterval(()=>{

const temp=pool[Math.floor(Math.random()*pool.length)];
box.innerHTML="🎡 "+temp.name;

count++;

if(count>12){
clearInterval(timer);

const final=pool[Math.floor(Math.random()*pool.length)];

box.innerHTML=`
🎉 <b>${final.name}</b><br>
📍 ${final.addr}
`;
}

},80);

};

</script>

</body>
</html>
